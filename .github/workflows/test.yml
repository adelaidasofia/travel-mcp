name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Smoke test (import)
        run: |
          python -c 'import server; print("travel-mcp imports cleanly")'
      - name: Pytest
        run: python -m pytest tests/ -v --ignore=tests/eval_fixtures

  eval-gate:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyyaml
      - name: Run eval gate (skip if no auth)
        env:
          TRAVEL_MCP_EVAL_SKIP_OK: "1"
        run: python tests/eval_fixtures/run_evals.py

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade pip "ruff>=0.8,<1.0"
      - name: Lint
        run: ruff check .

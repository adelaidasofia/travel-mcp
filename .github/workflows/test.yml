name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Smoke test (import)
        run: |
          python -c 'import server; print("travel-mcp imports cleanly")'
      - name: Pytest
        run: python -m pytest tests/ -v --ignore=tests/eval_fixtures

  eval-gate:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyyaml
      - name: Run eval gate (skip if no auth)
        env:
          TRAVEL_MCP_EVAL_SKIP_OK: "1"
        run: python tests/eval_fixtures/run_evals.py

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade pip "ruff>=0.8,<1.0"
      - name: Lint
        run: ruff check .

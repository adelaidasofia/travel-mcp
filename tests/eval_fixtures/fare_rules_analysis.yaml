- name: bog_jfk_round_trip
  tool: fare_rules_analysis
  input:
    origin: BOG
    destination: JFK
    dates: "2026-12-15..2026-12-22"
    carriers:
      - American Airlines
      - Avianca
  n_samples: 3
  expected_substrings_any_case:
    - legitimate
    - off-limits
    - fare basis
  expected_absent_case_sensitive:
    - PRIVATE_TRAVELER_FIRST_NAME
    - PRIVATE_COMPANY_CODENAME

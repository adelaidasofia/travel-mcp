- name: nyc_vs_lisbon
  tool: compare_trips
  input:
    option_a_destination: New York
    option_a_outbound: "2026-12-15"
    option_a_return: "2026-12-22"
    option_a_purpose: business
    option_b_destination: Lisbon
    option_b_outbound: "2026-12-15"
    option_b_return: "2026-12-22"
    option_b_purpose: leisure
  n_samples: 3
  expected_substrings_any_case:
    - option a
    - option b
    - recommendation
  expected_absent_case_sensitive:
    - PRIVATE_TRAVELER_FIRST_NAME
    - PRIVATE_COMPANY_CODENAME

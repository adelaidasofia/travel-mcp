- name: nyc_business
  tool: trip_prep_brief
  input:
    destination: New York
    dates: "2026-12-15..2026-12-22"
    hotel: Marriott Marquis Times Square
    purpose: business
    traveling_with: solo
    vibe: efficient and comfortable
  n_samples: 3
  expected_substrings_any_case:
    - weather
    - restaurants
    - what i might forget
    - money
  expected_absent_case_sensitive:
    - PRIVATE_TRAVELER_FIRST_NAME
    - PRIVATE_COMPANY_CODENAME
    - PRIVATE_PROJECT_CODENAME
